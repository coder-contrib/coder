name: Start Workspace On Issue Creation or Comment

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@coder')) || 
      (github.event_name == 'issues' && contains(github.event.issue.body, '@coder'))
    environment: dev.coder.com
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Determine GitHub username
        id: get-username
        run: |
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            echo "github_username=${{ github.event.comment.user.login }}" >> $GITHUB_OUTPUT
          else
            echo "github_username=${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Read username mapping
        id: get-mapping
        run: |
          # Get GitHub username from previous step
          GITHUB_USERNAME="${{ steps.get-username.outputs.github_username }}"
          echo "Looking up Coder username for GitHub user: $GITHUB_USERNAME"
          
          # Read mapping from JSON file
          CODER_USERNAME=$(jq -r ".githubToCoderUsernames.\"$GITHUB_USERNAME\"" username-mapping.json)
          
          # If username not found in mapping file, output error
          if [ "$CODER_USERNAME" == "null" ]; then
            echo "::error::GitHub username $GITHUB_USERNAME not found in username-mapping.json"
            echo "using_default_username=true" >> $GITHUB_OUTPUT
            echo "coder_username=defaultcoderuser" >> $GITHUB_OUTPUT
          else
            echo "Found mapping: $GITHUB_USERNAME -> $CODER_USERNAME"
            echo "using_default_username=false" >> $GITHUB_OUTPUT
            echo "coder_username=$CODER_USERNAME" >> $GITHUB_OUTPUT
          fi
      
      - name: Start Coder workspace
        uses: coder/start-workspace-action@35a4608cefc7e8cc56573cae7c3b85304575cb72
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Use the mapped coder username directly instead of github-username
          coder-username: ${{ steps.get-mapping.outputs.coder_username }}
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          template-name: ${{ secrets.CODER_TEMPLATE_NAME }}
          parameters: |-
            AI Prompt: |
              Use the gh CLI tool to read the details of issue https://github.com/${{ github.repository }}/issues/${{ github.event.issue.number }} and then address it.

              If in a research/Q&A capacity, comment back on the issue to explain what you have discovered.

              If there is also work to do, begin work and create a pull request with the solved issue. Include a link to the workspace (e.g. https://demo.coder.com/${{ steps.get-mapping.outputs.coder_username }}/issue-${{ github.event.issue.number }}) in the PR description, using the actual workspace URL that will be provided in the issue comment. Watch the pull request for comments periodically so you can address those comments too.